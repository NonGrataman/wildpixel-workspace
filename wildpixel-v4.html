<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wild Pixel — Workspace</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#030c0c;--sur:#071414;--sur2:#0d1e1e;--sur3:#122828;
  --b:#4dd9c018;--b2:#4dd9c030;--b3:#4dd9c055;
  --acc:#4dd9c0;--acc2:#2bb8a0;--acc3:#1a6055;--dim:#0a1c1c;
  --tx:#d0ece8;--mu:#3d7a72;--mu2:#6ab5ac;
  --ok:#4dd9c0;--warn:#e8a020;--err:#e84040;--inf:#4db8ff;
  --purple:#b44dff;
  --r:8px;--rs:6px;--rl:12px;
}
html{font-size:15px}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 100% 50% at 50% -10%,#4dd9c008,transparent 60%);pointer-events:none;z-index:0}
button,input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--b3);border-radius:4px}

/* AUTH */
#authScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;position:relative;z-index:1}
.auth-box{background:var(--sur);border:1px solid var(--b2);border-radius:var(--rl);padding:36px 32px;width:100%;max-width:380px;position:relative;overflow:hidden}
.auth-box::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--acc) 50%,transparent)}
.auth-logo-img{width:130px;margin:0 auto 4px;display:block;filter:drop-shadow(0 0 24px #4dd9c055)}
.auth-sub{font-size:9px;color:var(--mu);letter-spacing:3px;text-transform:uppercase;text-align:center;margin-bottom:24px}
.auth-tabs{display:flex;gap:2px;background:var(--sur2);padding:3px;border-radius:var(--rs);margin-bottom:18px;border:1px solid var(--b)}
.auth-tab{flex:1;padding:7px;border-radius:4px;font-size:12px;cursor:pointer;color:var(--mu2);border:none;background:none;transition:all .15s;letter-spacing:.5px}
.auth-tab.active{background:var(--dim);color:var(--acc);font-weight:500;box-shadow:0 0 0 1px var(--b2)}
.auth-err{font-size:11px;padding:8px 11px;border-radius:var(--rs);margin-bottom:11px;display:none}
.auth-err.bad{background:#e8404018;border:1px solid #e8404040;color:var(--err)}
.auth-err.good{background:#4dd9c018;border:1px solid #4dd9c040;color:var(--acc)}

/* APP */
#app{display:none;min-height:100vh;position:relative;z-index:1}
.layout{display:flex;min-height:100vh}

/* SIDEBAR — Notion style */
.sidebar{width:240px;background:var(--sur);border-right:1px solid var(--b);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:40;transition:transform .25s}
.s-logo{padding:14px 14px 10px;border-bottom:1px solid var(--b)}
.s-logo-img{width:80px;display:block;margin:0 auto 2px;filter:drop-shadow(0 0 12px #4dd9c050)}
.s-logo-sub{font-size:8px;color:var(--mu);letter-spacing:3px;text-transform:uppercase;text-align:center}

.online-strip{padding:7px 10px;border-bottom:1px solid var(--b)}
.online-label{font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:2px;margin-bottom:5px;font-weight:600}
.online-users{display:flex;flex-wrap:wrap;gap:3px;min-height:20px}
.o-dot{width:22px;height:22px;border-radius:50%;background:var(--acc3);border:1.5px solid var(--acc);display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:var(--bg);position:relative;cursor:default;flex-shrink:0;box-shadow:0 0 6px #4dd9c030}
.o-dot::after{content:'';position:absolute;bottom:0;right:0;width:5px;height:5px;background:var(--acc);border-radius:50%;border:1px solid var(--bg)}

.user-chip{margin:7px 8px 2px;padding:7px 10px;background:var(--sur2);border-radius:var(--rs);border:1px solid var(--b);display:flex;align-items:center;gap:7px}
.u-av{width:24px;height:24px;border-radius:6px;background:var(--acc3);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--bg);flex-shrink:0;border:1px solid var(--acc)}
.u-name{font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.u-role{font-size:9px;color:var(--mu);margin-top:1px}
.logout-btn{background:none;border:none;color:var(--mu);cursor:pointer;font-size:14px;padding:2px;line-height:1}
.logout-btn:hover{color:var(--err)}

/* NOTION-STYLE NAV */
.nav{padding:8px 6px;flex:1}
.nav-sec{font-size:9px;color:var(--mu);letter-spacing:2px;text-transform:uppercase;padding:10px 10px 4px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.ni{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:var(--rs);cursor:pointer;font-size:13px;color:var(--mu2);border:none;background:none;width:100%;text-align:left;transition:all .1s;position:relative;letter-spacing:.1px}
.ni:hover{background:#4dd9c008;color:var(--tx)}
.ni.on{background:#4dd9c010;color:var(--acc)}
.ni.on::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:2px;background:var(--acc);border-radius:2px;box-shadow:0 0 6px var(--acc)}
.ni-icon{width:16px;height:16px;flex-shrink:0;opacity:.6;font-size:14px;display:flex;align-items:center;justify-content:center}
.ni.on .ni-icon,.ni:hover .ni-icon{opacity:1}
.nbdg{margin-left:auto;background:var(--dim);color:var(--mu2);font-size:9px;padding:1px 5px;border-radius:10px;border:1px solid var(--b)}
.nbdg.hot{background:#e8404018;color:var(--err);border-color:#e8404035}

/* TOPBAR */
.topbar{padding:11px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b);background:var(--sur);position:sticky;top:0;z-index:30;flex-shrink:0}
.tbar-l{display:flex;align-items:center;gap:10px}
.pg-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:19px;letter-spacing:1.5px;color:var(--acc);text-transform:uppercase}
.tbar-r{display:flex;align-items:center;gap:8px;position:relative}

/* NOTIF */
.notif-btn{background:none;border:1px solid var(--b2);border-radius:var(--rs);padding:6px;cursor:pointer;color:var(--mu2);display:flex;align-items:center;position:relative;transition:all .12s}
.notif-btn:hover{background:var(--dim);color:var(--acc);border-color:var(--b3)}
.notif-dot{position:absolute;top:3px;right:3px;width:6px;height:6px;background:var(--err);border-radius:50%;border:1px solid var(--sur);display:none;box-shadow:0 0 5px var(--err)}
.notif-panel{display:none;position:absolute;top:calc(100% + 8px);right:0;width:295px;background:var(--sur);border:1px solid var(--b2);border-radius:var(--r);z-index:200}
.notif-panel.open{display:block}
.notif-hdr{padding:9px 13px;border-bottom:1px solid var(--b);font-size:10px;font-weight:600;display:flex;justify-content:space-between;align-items:center;color:var(--mu);text-transform:uppercase;letter-spacing:1px}
.notif-list{max-height:280px;overflow-y:auto}
.notif-item{padding:10px 13px;border-bottom:1px solid var(--b);cursor:pointer;transition:background .1s}
.notif-item:hover{background:var(--dim)}
.notif-item.unread{border-left:2px solid var(--acc)}
.notif-t{font-size:12px;font-weight:500;margin-bottom:2px}
.notif-s{font-size:10px;color:var(--mu2)}
.notif-time{font-size:9px;color:var(--mu);margin-top:2px}
.notif-empty{padding:20px;text-align:center;color:var(--mu);font-size:12px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--rs);font-size:12px;cursor:pointer;border:1px solid var(--b2);background:transparent;color:var(--tx);transition:all .12s;white-space:nowrap;letter-spacing:.3px}
.btn:hover{background:var(--dim);border-color:var(--b3)}
.btn:active{transform:scale(.98)}
.btn-acc{background:var(--acc);color:var(--bg);border-color:transparent;font-weight:700;letter-spacing:.5px}
.btn-acc:hover{background:var(--acc2)}
.btn-sm{padding:4px 8px;font-size:10px}
.btn-ghost{border-color:transparent;color:var(--mu2)}
.btn-ghost:hover{color:var(--tx);background:var(--dim)}
.btn-del{border-color:var(--err);color:var(--err)}
.btn-del:hover{background:#e8404018}
.btn-warn{border-color:var(--warn);color:var(--warn)}
.btn-warn:hover{background:#e8a02018}

/* PAGE */
.page{padding:20px 24px 50px;flex:1;max-width:1200px}
.page-hidden{display:none}
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow-y:auto}

/* NOTION-STYLE PAGE HEADER */
.page-hdr{margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--b)}
.page-hdr-title{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;letter-spacing:.5px;color:var(--tx);margin-bottom:4px}
.page-hdr-sub{font-size:12px;color:var(--mu2)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:24px}
.stat{background:var(--sur);border:1px solid var(--b);border-radius:var(--r);padding:14px 16px;position:relative;overflow:hidden;cursor:default;transition:border-color .12s}
.stat:hover{border-color:var(--b3)}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--acc) 50%,transparent);opacity:.4}
.stat-l{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;font-weight:600}
.stat-v{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;line-height:1}
.ca{color:var(--acc)}.ci{color:var(--inf)}.cw{color:var(--warn)}.cs{color:var(--ok)}.ce{color:var(--err)}.cm{color:var(--mu2)}.cp{color:var(--purple)}

/* NOTION SECTION */
.sec{margin-bottom:24px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-title{font-size:11px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:1.5px;display:flex;align-items:center;gap:6px}
.sec-title::before{content:'';display:inline-block;width:3px;height:12px;background:var(--acc);border-radius:2px}

/* TABLE */
.tw{background:var(--sur);border:1px solid var(--b);border-radius:var(--r);overflow:hidden;overflow-x:auto}
.tw table{width:100%;border-collapse:collapse;font-size:12px;min-width:440px}
.tw th{padding:8px 12px;text-align:left;font-size:9px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:1.2px;border-bottom:1px solid var(--b);background:var(--sur2);white-space:nowrap}
.tw td{padding:10px 12px;border-bottom:1px solid var(--b);vertical-align:middle}
.tw tr:last-child td{border-bottom:none}
.tw tr.clk{cursor:pointer}
.tw tr.clk:hover td{background:#4dd9c005}

/* BADGES */
.bd{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700;white-space:nowrap;letter-spacing:.5px}
.bd-lead{background:#4db8ff12;color:var(--inf);border:1px solid #4db8ff25}
.bd-contacted,.bd-pending,.bd-medium{background:#e8a02012;color:var(--warn);border:1px solid #e8a02025}
.bd-proposal,.bd-active,.bd-shoot{background:#4dd9c012;color:var(--acc);border:1px solid var(--b2)}
.bd-won,.bd-done,.bd-paid,.bd-signed,.bd-available,.bd-fullysigned{background:#4dd9c018;color:var(--ok);border:1px solid var(--b3)}
.bd-lost,.bd-overdue,.bd-onleave{background:#e8404012;color:var(--err);border:1px solid #e8404025}
.bd-negotiation,.bd-review,.bd-post{background:#b44dff12;color:var(--purple);border:1px solid #b44dff25}
.bd-brief,.bd-preproduction,.bd-inprogress,.bd-sent,.bd-onproject{background:#4db8ff12;color:var(--inf);border:1px solid #4db8ff25}
.bd-draft,.bd-todo,.bd-low,.bd-archived,.bd-delivered{background:#ffffff08;color:var(--mu);border:1px solid var(--b)}
.bd-high{background:#e8404012;color:var(--err);border:1px solid #e8404025}
.bd-partiallypaid,.bd-назначено{background:#e8a02012;color:var(--warn);border:1px solid #e8a02025}
.bd-admin{background:#b44dff18;color:var(--purple);border:1px solid #b44dff35}
.bd-member{background:#4db8ff12;color:var(--inf);border:1px solid #4db8ff25}
.bd-черновик,.bd-другое,.bd-другое2{background:#ffffff08;color:var(--mu);border:1px solid var(--b)}
.bd-наподписи{background:#e8a02012;color:var(--warn);border:1px solid #e8a02025}
.bd-подписан{background:#4dd9c018;color:var(--ok);border:1px solid var(--b3)}
.bd-архив{background:#ffffff08;color:var(--mu);border:1px solid var(--b)}
.bd-переговоры,.bd-встреча,.bd-звонок,.bd-брифинг{background:#4dd9c012;color:var(--acc);border:1px solid var(--b2)}

/* KANBAN */
.kanban{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;align-items:flex-start}
.kcol{background:var(--sur);border:1px solid var(--b);border-radius:var(--r);min-width:210px;width:210px;flex-shrink:0}
.khdr{padding:9px 12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--mu);border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;font-family:'Rajdhani',sans-serif}
.kcnt{font-size:9px;color:var(--mu);background:var(--dim);padding:1px 5px;border-radius:10px;border:1px solid var(--b)}
.kcards{padding:7px;display:flex;flex-direction:column;gap:5px;min-height:40px}
.kcard{background:var(--sur2);border:1px solid var(--b);border-radius:var(--rs);padding:10px;cursor:pointer;transition:all .12s}
.kcard:hover{border-color:var(--b3);background:var(--dim)}
.kcard-n{font-size:12px;font-weight:500;margin-bottom:3px}
.kcard-m{font-size:10px;color:var(--mu2)}
.kcard-v{font-size:12px;color:var(--acc);margin-top:4px;font-weight:700;font-family:'Rajdhani',sans-serif}
.kcard-next{font-size:10px;color:var(--mu);margin-top:5px;padding-top:5px;border-top:1px solid var(--b)}
.kadd{width:100%;background:none;border:none;color:var(--mu);font-size:11px;padding:7px;cursor:pointer;text-align:left;border-radius:var(--rs)}
.kadd:hover{background:var(--dim);color:var(--acc)}

/* GANTT */
.gantt-wrap{background:var(--sur);border:1px solid var(--b);border-radius:var(--r);overflow:hidden}
.gantt-body{display:flex}
.gantt-labels{width:190px;flex-shrink:0;border-right:1px solid var(--b)}
.gantt-label-row{padding:8px 12px;border-bottom:1px solid var(--b);font-size:11px;display:flex;align-items:center;gap:6px;cursor:pointer;height:36px}
.gantt-label-row:hover{background:var(--dim)}
.gantt-label-row:last-child{border-bottom:none}
.gantt-rows-w{flex:1;overflow-x:auto}
.gantt-row{height:36px;border-bottom:1px solid var(--b);position:relative}
.gantt-row:last-child{border-bottom:none}
.gantt-bar{position:absolute;height:20px;top:8px;border-radius:3px;display:flex;align-items:center;padding:0 7px;font-size:9px;font-weight:700;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.5px;font-family:'Rajdhani',sans-serif}
.gantt-today{position:absolute;top:0;bottom:0;width:1px;background:var(--err);opacity:.7;pointer-events:none;z-index:2;box-shadow:0 0 4px var(--err)}
.gantt-hdr{display:flex;border-bottom:1px solid var(--b)}
.gantt-lhdr{width:190px;flex-shrink:0;padding:7px 12px;font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;background:var(--sur2);border-right:1px solid var(--b);font-weight:600}
.gantt-mhdr{flex:1;overflow:hidden;background:var(--sur2);display:flex}
.gantt-month{flex-shrink:0;padding:7px 4px;font-size:9px;color:var(--mu);text-align:center;border-right:1px solid var(--b);text-transform:uppercase;font-weight:600}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:1px}
.cal-g7{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--b)}
.cal-hdr{background:var(--sur2);padding:7px 4px;font-size:9px;color:var(--mu);text-align:center;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.cal-cell{background:var(--sur);padding:5px;min-height:72px}
.cal-dn{font-size:10px;color:var(--mu);margin-bottom:2px;font-weight:500}
.cal-dn.today{color:var(--acc);font-weight:700}
.cal-ev{font-size:9px;padding:2px 4px;border-radius:3px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.cal-ev.proj{background:#4dd9c012;color:var(--acc);border-left:2px solid var(--acc)}
.cal-ev.task{background:#b44dff12;color:var(--purple);border-left:2px solid var(--purple)}
.cal-ev.note{background:#e8a02012;color:var(--warn);border-left:2px solid var(--warn)}

/* DOCUMENT CARDS — Notion style */
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.doc-card{background:var(--sur);border:1px solid var(--b);border-radius:var(--r);padding:16px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.doc-card:hover{border-color:var(--b3);transform:translateY(-1px);box-shadow:0 4px 20px #4dd9c010}
.doc-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--r) var(--r) 0 0}
.doc-card.status-draft::before{background:var(--mu)}
.doc-card.status-pending::before{background:var(--warn)}
.doc-card.status-signed::before{background:var(--ok)}
.doc-card.status-archived::before{background:var(--inf)}
.doc-icon{width:36px;height:36px;border-radius:var(--rs);background:var(--sur2);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:10px}
.doc-name{font-size:13px;font-weight:500;margin-bottom:4px;line-height:1.4}
.doc-meta{font-size:10px;color:var(--mu2);margin-bottom:8px}
.doc-signers{display:flex;flex-direction:column;gap:3px}
.doc-signer-row{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;background:var(--sur2);border-radius:var(--rs);border:1px solid var(--b)}
.doc-file-link{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--acc);margin-top:8px;padding-top:8px;border-top:1px solid var(--b);text-decoration:none}
.doc-file-link:hover{color:var(--acc2)}

/* FILTER BAR */
.fbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.fbar input,.fbar select{background:var(--sur);border:1px solid var(--b2);border-radius:var(--rs);padding:6px 10px;color:var(--tx);font-size:12px;outline:none;transition:border-color .12s}
.fbar input{width:170px}
.fbar input:focus,.fbar select:focus{border-color:var(--acc)}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--sur2);padding:3px;border-radius:var(--rs);width:fit-content;margin-bottom:14px;border:1px solid var(--b)}
.tab{padding:5px 12px;border-radius:4px;font-size:11px;cursor:pointer;color:var(--mu2);border:none;background:none;transition:all .12s;letter-spacing:.2px}
.tab.on{background:var(--dim);color:var(--acc);font-weight:500;box-shadow:0 0 0 1px var(--b2)}

/* UPLOAD ZONE */
.upload-zone{border:1.5px dashed var(--b3);border-radius:var(--r);padding:28px;text-align:center;cursor:pointer;transition:all .15s;background:var(--sur);margin-bottom:16px}
.upload-zone:hover,.upload-zone.drag{border-color:var(--acc);background:#4dd9c008}
.upload-zone input{display:none}
.upload-icon{font-size:28px;margin-bottom:8px;opacity:.5}
.upload-text{font-size:13px;color:var(--mu2)}
.upload-sub{font-size:10px;color:var(--mu);margin-top:4px}
.upload-progress{height:3px;background:var(--b2);border-radius:3px;margin-top:12px;overflow:hidden;display:none}
.upload-progress-fill{height:100%;background:var(--acc);border-radius:3px;transition:width .3s}

/* NOTES */
.note-card{background:var(--sur);border:1px solid var(--b);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .12s;position:relative}
.note-card:hover{border-color:var(--b3);background:var(--dim)}
.note-title{font-size:13px;font-weight:500;margin-bottom:3px}
.note-meta{font-size:10px;color:var(--mu2);margin-bottom:5px}
.note-body{font-size:11px;color:var(--mu2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.note-action{margin-top:7px;padding-top:7px;border-top:1px solid var(--b);font-size:10px;color:var(--acc)}

/* TEAM CARDS */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.team-card{background:var(--sur);border:1px solid var(--b);border-radius:var(--r);padding:14px;position:relative;transition:all .12s}
.team-card:hover{border-color:var(--b2)}
.team-card.online{border-color:var(--b3);background:var(--dim)}
.team-card.online::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--acc) 50%,transparent)}
.team-online-dot{position:absolute;top:10px;right:10px;width:7px;height:7px;background:var(--acc);border-radius:50%;box-shadow:0 0 7px var(--acc);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.team-av{width:40px;height:40px;border-radius:8px;background:var(--acc3);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--bg);border:2px solid var(--b3);margin-bottom:8px}
.team-name{font-size:13px;font-weight:500;margin-bottom:2px}
.team-role-badge{margin-bottom:6px}

/* ROLES PANEL */
.roles-panel{background:var(--sur);border:1px solid var(--b);border-radius:var(--r);overflow:hidden}
.roles-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;border-bottom:1px solid var(--b)}
.roles-row:last-child{border-bottom:none}
.roles-row.header{background:var(--sur2);font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:1px}
.roles-cell{padding:10px 14px;font-size:12px;display:flex;align-items:center;gap:6px;border-right:1px solid var(--b)}
.roles-cell:last-child{border-right:none}
.roles-toggle{width:36px;height:20px;border-radius:20px;background:var(--dim);border:1px solid var(--b2);cursor:pointer;position:relative;transition:all .2s;flex-shrink:0}
.roles-toggle.on{background:var(--acc);border-color:var(--acc)}
.roles-toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .2s}
.roles-toggle.on::after{transform:translateX(16px)}

/* MODAL */
.mov{display:none;position:fixed;inset:0;background:#000000e0;z-index:100;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}
.mov.open{display:flex}
.mbox{background:var(--sur);border:1px solid var(--b2);border-radius:var(--rl);width:100%;max-width:540px;max-height:90vh;overflow-y:auto;position:relative}
.mbox.wide{max-width:680px}
.mbox::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--acc) 50%,transparent)}
.mhdr{padding:18px 20px 0;display:flex;align-items:center;justify-content:space-between}
.mtitle{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:17px;letter-spacing:1.5px;color:var(--acc);text-transform:uppercase}
.mx{background:none;border:none;color:var(--mu);cursor:pointer;font-size:20px;line-height:1;padding:2px}
.mx:hover{color:var(--err)}
.mbody{padding:16px 20px}
.mfoot{padding:0 20px 18px;display:flex;justify-content:flex-end;gap:8px}

/* FORM */
.fg{margin-bottom:11px}
.fl{display:block;font-size:9px;color:var(--mu);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.fi{width:100%;background:var(--sur2);border:1px solid var(--b2);border-radius:var(--rs);padding:8px 11px;color:var(--tx);font-size:13px;outline:none;transition:border-color .12s}
.fi:focus{border-color:var(--acc);box-shadow:0 0 0 2px #4dd9c010}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
textarea.fi{resize:vertical;min-height:70px}

/* AV */
.av{display:inline-flex;align-items:center;justify-content:center;border-radius:6px;background:var(--acc3);border:1px solid var(--b3);font-size:9px;font-weight:700;color:var(--bg);flex-shrink:0}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--sur2);border:1px solid var(--b2);border-radius:var(--rs);padding:10px 14px;font-size:12px;z-index:300;transform:translateY(70px);opacity:0;transition:all .25s;pointer-events:none;max-width:280px}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-left:2px solid var(--ok);box-shadow:0 0 20px #4dd9c012}
.toast.err{border-left:2px solid var(--err)}
.toast.info{border-left:2px solid var(--inf)}

.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--mu);font-size:12px;gap:10px}
.spin{width:15px;height:15px;border:1.5px solid var(--b3);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;box-shadow:0 0 6px #4dd9c020}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:var(--mu);font-size:12px}

/* PERMISSION DENIED */
.no-access{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;color:var(--mu)}
.no-access-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.no-access-title{font-size:15px;font-weight:500;color:var(--mu2);margin-bottom:6px}
.no-access-sub{font-size:12px}

/* MOB */
.mob-btn{display:none;background:none;border:1px solid var(--b2);border-radius:var(--rs);padding:7px;cursor:pointer;color:var(--tx)}
.ov-bg{display:none;position:fixed;inset:0;background:#00000090;z-index:39}

/* DIVIDER */
.divider{height:1px;background:var(--b);margin:20px 0}

@media(max-width:800px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .mob-btn{display:flex}
  .ov-bg.open{display:block}
  .page{padding:14px 14px 40px}
  .topbar{padding:10px 14px}
  .fr2{grid-template-columns:1fr}
  .stats{grid-template-columns:repeat(2,1fr)}
  .cal-cell{min-height:52px}
  .gantt-labels,.gantt-lhdr{width:120px}
  .roles-row{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="ov-bg" id="ovBg" onclick="closeMob()"></div>
<div class="mov" id="mov">
  <div class="mbox" id="mboxEl">
    <div class="mhdr"><div class="mtitle" id="mtitle">—</div><button class="mx" onclick="closeM()">×</button></div>
    <div class="mbody" id="mbody"></div>
    <div class="mfoot" id="mfoot"></div>
  </div>
</div>

function setupPresence(){

// HELPERS
function bdg(t){
  if(!t)return '';
  const m={
    'Lead':'lead','Contacted':'contacted','Proposal Sent':'proposal','Won':'won','Lost':'lost','Negotiation':'negotiation',
    'Brief':'brief','Pre-Production':'preproduction','Active':'active','Shoot':'shoot','Post':'post','Delivered':'delivered','Archived':'archived',
    'High':'high','Medium':'medium','Low':'low',
    'To Do':'todo','In Progress':'inprogress','Review':'review','Done':'done',
    'Draft':'draft','Sent':'sent','Paid':'paid','Overdue':'overdue','Partially Paid':'partiallypaid',
    'Pending':'pending','Signed':'signed','Available':'available','On Project':'onproject','On Leave':'onleave',
    'Fully Signed':'fullysigned',
    'Черновик':'черновик','На подписи':'наподписи','Подписан':'подписан','Архив':'архив',
    'Admin':'admin','Member':'member',
    'Переговоры':'переговоры','Встреча':'встреча','Звонок':'звонок','Брифинг':'брифинг','Другое':'другое'
  };
  const cls=m[t]||t.toLowerCase().replace(/\s+/g,'');
  return `<span class="bd bd-${cls}">${t}</span>`;
}
function fmtAED(n){return n?'AED '+Number(n).toLocaleString('en-AE'):'—';}
function fmtTime(iso){
  if(!iso)return '';
  const d=new Date(iso),now=new Date(),diff=Math.floor((now-d)/60000);
  if(diff<2)return 'только что';
  if(diff<60)return diff+'м назад';
  if(diff<1440)return Math.floor(diff/60)+'ч назад';
  return d.toLocaleDateString('ru',{day:'numeric',month:'short'});
}
function av(name,sz=24){
  const ini=(name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  return `<div class="av" style="width:${sz}px;height:${sz}px;font-size:${sz>30?12:9}px">${ini}</div>`;
}
function empty(txt){return `<div class="empty">${txt}</div>`;}
function secHdr(title,btn=''){return `<div class="sec-hdr"><div class="sec-title">${title}</div>${btn}</div>`;}

async function rGantt(){return `<div class="page-hdr"><div class="page-hdr-title">📅 Диаграмма Ганта</div></div><div id="ganttWrap"></div>`;}
function initGantt(){
  const wrap=document.getElementById('ganttWrap');if(!wrap)return;
  const projs=D.projects.filter(p=>p.start_date&&p.end_date&&p.status!=='Archived');
  if(!projs.length){wrap.innerHTML=empty('Добавь проекты со сроками');return;}
  const allD=projs.flatMap(p=>[new Date(p.start_date),new Date(p.end_date)]);
  let mn=new Date(Math.min(...allD)),mx=new Date(Math.max(...allD));
  mn=new Date(mn.getFullYear(),mn.getMonth(),1);mx=new Date(mx.getFullYear(),mx.getMonth()+1,0);
  const tot=Math.ceil((mx-mn)/86400000)+1,DW=22,RH=36,totW=tot*DW,today=new Date();
  const months=[];let d=new Date(mn);
  while(d<=mx){const y=d.getFullYear(),m=d.getMonth();const s=Math.max(0,Math.ceil((new Date(y,m,1)-mn)/86400000));const e=Math.min(tot-1,Math.ceil((new Date(y,m+1,0)-mn)/86400000));months.push({label:new Date(y,m,1).toLocaleDateString('ru',{month:'short',year:'2-digit'}),width:(e-s+1)*DW});d=new Date(y,m+1,1);}
  const tL=Math.ceil((today-mn)/86400000)*DW;
  wrap.innerHTML=`<div class="gantt-wrap">
    <div class="gantt-hdr">
      <div class="gantt-lhdr">Проект</div>
      <div class="gantt-mhdr" style="overflow:hidden"><div style="display:flex;min-width:${totW}px">${months.map(m=>`<div class="gantt-month" style="width:${m.width}px">${m.label}</div>`).join('')}</div></div>
    </div>
    <div class="gantt-body">
      <div class="gantt-labels">${projs.map(p=>`<div class="gantt-label-row" onclick="editRec('projects',${p.id})"><div style="width:7px;height:7px;border-radius:2px;background:${GCOL[projs.indexOf(p)%GCOL.length]};flex-shrink:0"></div><span style="font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</span></div>`).join('')}</div>
      <div class="gantt-rows-w"><div style="position:relative;width:${totW}px">
        ${projs.map((_,i)=>`<div class="gantt-row" style="width:${totW}px"></div>`).join('')}
        ${tL>=0&&tL<=totW?`<div class="gantt-today" style="left:${tL}px"></div>`:''}
        ${projs.map((p,i)=>{const s=Math.max(0,Math.ceil((new Date(p.start_date)-mn)/86400000));const e=Math.ceil((new Date(p.end_date)-mn)/86400000);const left=s*DW,width=Math.max(DW,(e-s+1)*DW);const color=GCOL[i%GCOL.length];return `<div class="gantt-bar" style="left:${left}px;top:${i*RH+8}px;width:${width}px;background:${color}22;border:1px solid ${color}66;color:${color}" onclick="editRec('projects',${p.id})">${p.name}</div>`;}).join('')}
      </div></div>
    </div>
  </div>
  <div style="margin-top:8px;font-size:10px;color:var(--mu)">🔴 Красная линия = сегодня</div>`;
}

async function rCal(){return `<div class="page-hdr"><div class="page-hdr-title">🗓️ Календарь</div></div><div id="calWrap"></div>`;}
function initCal(){
  const wrap=document.getElementById('calWrap');if(!wrap)return;
  const now=new Date(calYear,calMonth,1);
  const mname=now.toLocaleDateString('ru',{month:'long',year:'numeric'});
  const firstDay=(now.getDay()+6)%7,daysInMonth=new Date(calYear,calMonth+1,0).getDate(),today=new Date();
  const evs={};
  const addEv=(dt,txt,cls)=>{if(!evs[dt])evs[dt]=[];evs[dt].push({txt,cls});};
  D.projects.forEach(p=>{const ym=`${calYear}-${String(calMonth+1).padStart(2,'0')}`;if(p.start_date?.startsWith(ym))addEv(p.start_date,'▶ '+p.name,'proj');if(p.end_date?.startsWith(ym))addEv(p.end_date,'■ '+p.name,'proj');});
  D.tasks.forEach(t=>{if(t.due_date?.startsWith(`${calYear}-${String(calMonth+1).padStart(2,'0')}`))addEv(t.due_date,'✓ '+t.name,'task');});
  D.notes.forEach(n=>{if(n.meeting_date?.startsWith(`${calYear}-${String(calMonth+1).padStart(2,'0')}`))addEv(n.meeting_date,'💬 '+n.title,'note');});
  const days=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  let cells='';
  for(let i=0;i<firstDay;i++)cells+=`<div class="cal-cell"></div>`;
  for(let dd=1;dd<=daysInMonth;dd++){const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;const isT=today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===dd;cells+=`<div class="cal-cell"><div class="cal-dn${isT?' today':''}">${dd}</div>${(evs[ds]||[]).slice(0,3).map(e=>`<div class="cal-ev ${e.cls}">${e.txt}</div>`).join('')}</div>`;}
  wrap.innerHTML=`<div class="cal-nav"><button class="btn" onclick="calNav(-1)">‹</button><div class="cal-title">${mname}</div><button class="btn" onclick="calNav(1)">›</button></div>
  <div style="background:var(--sur);border:1px solid var(--b);border-radius:var(--r);overflow:hidden">
    <div class="cal-g7">${days.map(d=>`<div class="cal-hdr">${d}</div>`).join('')}</div>
    <div class="cal-g7">${cells}</div>
  </div>
  <div style="display:flex;gap:12px;margin-top:10px;font-size:10px;color:var(--mu2)">
    <span style="color:var(--acc)">▶ Проекты</span>
    <span style="color:var(--purple)">✓ Задачи</span>
    <span style="color:var(--warn)">💬 Встречи</span>
  </div>`;
}
function calNav(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}initCal();}

    </select>

      <option value="">Все проекты</option>
      ${[...new Set(D.docs.map(d=>d.project).filter(Boolean))].map(p=>`<option>${p}</option>`).join('')}

    <select id="docTy" onchange="filterDocs()">
      <option value="">Все типы</option>

    <button class="tab" onclick="docTabSwitch('signed',this)">Подписаны (${byStatus.signed.length})</button>
    <button class="tab" onclick="docTabSwitch('archived',this)">Архив (${byStatus.archived.length})</button>
  </div>
  <div id="docContent">${buildDocGrid(allDocs)}</div>`;
}

function filterDocs(){
  const s=(document.getElementById('docS')?.value||'').toLowerCase();
  const st=document.getElementById('docSt')?.value||'';
  const pr=document.getElementById('docPr')?.value||'';
  const ty=document.getElementById('docTy')?.value||'';
  const activeTab=document.querySelector('#docTabs .tab.on')?.textContent?.split(' ')[0]?.toLowerCase()||'все';
  let docs=D.docs.filter(d=>{
    if(s&&!d.name.toLowerCase().includes(s))return false;
    if(pr&&d.project!==pr)return false;
    if(ty&&d.type!==ty)return false;
    if(st){
      if(st==='На подписи'&&!(d.signers&&d.signers.some(s=>s.status==='Pending')))return false;
      if(st==='Подписан'&&d.status!=='Fully Signed'&&d.doc_status!=='Подписан')return false;
      if(st==='Черновик'&&d.doc_status!=='Черновик')return false;
      if(st==='Архив'&&d.doc_status!=='Архив')return false;
    }
    return true;
  });
  document.getElementById('docContent').innerHTML=buildDocGrid(docs);
}

function docTabSwitch(type,btn){
  document.querySelectorAll('#docTabs .tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  let docs=D.docs;
  if(type==='pending')docs=D.docs.filter(d=>d.signers&&d.signers.some(s=>s.status==='Pending')&&d.doc_status!=='Подписан'&&d.doc_status!=='Архив');
  else if(type==='signed')docs=D.docs.filter(d=>d.status==='Fully Signed'||d.doc_status==='Подписан');
  else if(type==='archived')docs=D.docs.filter(d=>d.doc_status==='Архив');
  document.getElementById('docContent').innerHTML=buildDocGrid(docs);
}

function getDocStatusLabel(d){
  if(d.doc_status)return d.doc_status;
  if(d.status==='Fully Signed')return 'Подписан';
  if(d.signers&&d.signers.some(s=>s.status==='Pending'))return 'На подписи';
  if(d.signers&&d.signers.length>0)return 'Подписан';
  return 'Черновик';
}

function getDocStatusClass(d){
  const s=getDocStatusLabel(d);
  if(s==='Черновик')return 'draft';
  if(s==='На подписи')return 'pending';
  if(s==='Подписан')return 'signed';
  if(s==='Архив')return 'archived';
  return 'draft';
}

function getFileIcon(filename){
  if(!filename)return '📄';
  const ext=(filename.split('.').pop()||'').toLowerCase();
  if(['pdf'].includes(ext))return '📕';
  if(['doc','docx'].includes(ext))return '📘';
  if(['xls','xlsx'].includes(ext))return '📗';
  if(['png','jpg','jpeg','gif'].includes(ext))return '🖼️';
  return '📄';
}

function buildDocGrid(docs){
  if(!docs.length)return empty('Нет документов');
  return `<div class="doc-grid">${docs.map(d=>`
    <div class="doc-card status-${getDocStatusClass(d)}" onclick="openDocDetail(${d.id})">
      <div class="doc-icon">${getFileIcon(d.file_name)}</div>
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px">

      ${d.file_name&&d.file_url?`<a class="doc-file-link" href="${d.file_url}" target="_blank" onclick="event.stopPropagation()">📎 ${d.file_name}</a>`:''}
      <div class="doc-signers">${(d.signers||[]).map(s=>`
        <div class="doc-signer-row">
          <span style="color:var(--mu2);font-size:10px">${s.name}</span>
          ${bdg(s.status)}
        </div>`).join('')}</div>
    </div>`).join('')}</div>`;
}

async function setDocStatus(docId,status){
  await dbU('documents',docId,{doc_status:status});
  D.docs=D.docs.map(d=>d.id===docId?{...d,doc_status:status}:d);
  toast('Статус обновлён','ok');closeM();render('docs');
}

async function signDoc(docId,idx){
  const d=D.docs.find(x=>x.id===docId);if(!d)return;
  const signers=[...(d.signers||[])];
  const name=curUser?.user_metadata?.full_name||curUser?.email||'Unknown';
  signers[idx]={...signers[idx],status:'Signed',signed_at:new Date().toISOString().slice(0,10),signed_by:name};
  const allSigned=signers.every(s=>s.status==='Signed');
  const newStatus=allSigned?'Fully Signed':'Pending';
  await dbU('documents',docId,{signers,status:newStatus,doc_status:allSigned?'Подписан':undefined});
  if(allSigned)await addNotif('Документ полностью подписан','«'+d.name+'» подписан всеми','docs');
  else await addNotif(name+' подписал документ','«'+d.name+'»','docs');
  D.docs=D.docs.map(x=>x.id===docId?{...x,signers,status:newStatus,doc_status:allSigned?'Подписан':x.doc_status}:x);
  toast('Подписано ✓','ok');closeM();render('docs');
}

// FILE UPLOAD
function handleFileDrop(e){
  e.preventDefault();document.getElementById('uploadZone').classList.remove('drag');
  const file=e.dataTransfer.files[0];if(file)uploadFile(file);
}
function handleFileSelect(input){const file=input.files[0];if(file)uploadFile(file);}

async function uploadFile(file){
  if(file.size>50*1024*1024){toast('Файл слишком большой (макс. 50 MB)','err');return;}
  const ext=file.name.split('.').pop();
  const path=`docs/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
  const prog=document.getElementById('uploadProgress');
  const fill=document.getElementById('uploadFill');
  prog.style.display='block';fill.style.width='30%';

  const{data,error}=await sb.storage.from('documents').upload(path,file,{cacheControl:'3600',upsert:false});
  fill.style.width='80%';
  if(error){
    prog.style.display='none';
    if(error.message.includes('bucket')){
      toast('Хранилище не настроено. Создай bucket "documents" в Supabase Storage','err');
    } else {
      toast('Ошибка загрузки: '+error.message,'err');
    }
    return;
  }
  const{data:urlData}=sb.storage.from('documents').getPublicUrl(path);
  fill.style.width='100%';
  setTimeout(()=>{prog.style.display='none';fill.style.width='0%';},500);

  // Open modal to fill doc details with pre-filled filename
  openAddFor('docs',{file_name:file.name,file_url:urlData.publicUrl});
  toast('Файл загружен! Заполни детали.','ok');
}

    <div class="fg"><label class="fl">Проект</label><input class="fi" id="f_project" placeholder="Название проекта"></div></div>
    <div class="fg"><label class="fl">Статус</label><select class="fi" id="f_doc_status"><option>Черновик</option><option>На подписи</option><option>Подписан</option><option>Архив</option></select></div>
    <div class="fg"><label class="fl">Файл (название)</label><input class="fi" id="f_file_name" placeholder="contract.pdf"></div>
    <div class="fg"><label class="fl">Ссылка на файл</label><input class="fi" id="f_file_url" type="url" placeholder="https://..."></div>
    <div class="fg"><label class="fl">Дедлайн подписи</label><input class="fi" id="f_due_date" type="date"></div>
    <div class="fg"><label class="fl">Подписанты (через запятую)</label><input class="fi" id="f_signer_names" placeholder="Daniil, Ahmed, Maria"></div>
    <div class="fg"><label class="fl">Заметки</label><textarea class="fi" id="f_notes"></textarea></div>`,

  meeting_notes:`<div class="fg"><label class="fl">Тема / Название *</label><input class="fi" id="f_title" placeholder="Переговоры с клиентом X, Брифинг..."></div>
    <div class="fr2"><div class="fg"><label class="fl">Тип встречи</label><select class="fi" id="f_category"><option>Переговоры</option><option>Встреча</option><option>Звонок</option><option>Брифинг</option><option>Другое</option></select></div>
    <div class="fg"><label class="fl">Дата</label><input class="fi" id="f_meeting_date" type="date"></div></div>
    <div class="fr2"><div class="fg"><label class="fl">Участники</label><input class="fi" id="f_participants" placeholder="Daniil, Ahmed Al-Rashid..."></div>
    <div class="fg"><label class="fl">Проект / Клиент</label><input class="fi" id="f_project" placeholder="Название"></div></div>
    <div class="fg"><label class="fl">Итоги / О чём говорили</label><textarea class="fi" id="f_body" rows="5" placeholder="Что обсудили, договорённости, ключевые моменты..."></textarea></div>
    <div class="fg"><label class="fl">Action Items / Следующие шаги</label><textarea class="fi" id="f_action_items" rows="3" placeholder="1. Отправить КП до 15 мая&#10;2. Согласовать бюджет"></textarea></div>`,

  invoices:`<div class="fr2"><div class="fg"><label class="fl">Номер инвойса</label><input class="fi" id="f_num" placeholder="WP-2025-001"></div>
    <div class="fg"><label class="fl">Тип</label><select class="fi" id="f_type"><option>Invoice</option><option>Quote</option><option>Expense</option></select></div></div>
    <div class="fr2"><div class="fg"><label class="fl">Клиент *</label><input class="fi" id="f_client" placeholder="Название клиента"></div>
    <div class="fg"><label class="fl">Проект</label><input class="fi" id="f_project" placeholder="Название проекта"></div></div>
    <div class="fr2"><div class="fg"><label class="fl">Сумма (AED) *</label><input class="fi" id="f_amount" type="number" placeholder="0"></div>
    <div class="fg"><label class="fl">Статус</label><select class="fi" id="f_status"><option>Draft</option><option>Sent</option><option>Paid</option><option>Overdue</option><option>Partially Paid</option></select></div></div>
    <div class="fr2"><div class="fg"><label class="fl">Дата выставления</label><input class="fi" id="f_issue_date" type="date"></div>
    <div class="fg"><label class="fl">Срок оплаты</label><input class="fi" id="f_due_date" type="date"></div></div>
    <div class="fg"><label class="fl">Описание</label><input class="fi" id="f_description" placeholder="За что выставлен инвойс"></div>`,

  team_members:`<div class="fg"><label class="fl">Имя *</label><input class="fi" id="f_name" placeholder="Имя Фамилия"></div>
    <div class="fr2"><div class="fg"><label class="fl">Роль</label><select class="fi" id="f_role"><option>Member</option><option>Admin</option><option>Director</option><option>Producer</option><option>VP Tech</option><option>Art Director</option><option>Editor</option><option>DIT</option><option>Freelancer</option><option>Other</option></select></div>
    <div class="fg"><label class="fl">Статус</label><select class="fi" id="f_availability"><option>Available</option><option>On Project</option><option>On Leave</option></select></div></div>
    <div class="fr2"><div class="fg"><label class="fl">Текущий проект</label><input class="fi" id="f_current_project" placeholder="Название"></div>
    <div class="fg"><label class="fl">Контакт</label><input class="fi" id="f_contact" placeholder="Telegram / тел."></div></div>
    <div class="fg"><label class="fl">Навыки</label><input class="fi" id="f_skills" placeholder="LED Volume, Unreal Engine, DIT..."></div>`
};

const FIELDS={
  clients:['name','type','source','stage','value','contact','next_action','next_date','notes'],
  projects:['name','client','type','status','start_date','end_date','budget','drive_link'],
  tasks:['name','project','assignee','priority','status','due_date'],
  docs:['name','type','project','doc_status','file_name','file_url','due_date','notes'],
  meeting_notes:['title','category','meeting_date','participants','project','body','action_items'],
  invoices:['num','type','client','project','amount','status','issue_date','due_date','description'],
  team_members:['name','role','availability','current_project','contact','skills']
};
const DKEY={clients:'clients',projects:'projects',tasks:'tasks',docs:'docs',meeting_notes:'notes',invoices:'invoices',team_members:'team'};
const COL_MAP={dash:'clients',bd:'clients',crm:'clients',projects:'projects',gantt:'projects',cal:'projects',tasks:'tasks',docs:'docs',notes:'meeting_notes',finance:'invoices',team:'team_members',settings:null};
const COL_TITLES={clients:'лид',projects:'проект',tasks:'задачу',docs:'документ',meeting_notes:'встречу',invoices:'инвойс',team_members:'участника'};
let curModal=null,editId=null;

function openAdd(){
  const col=COL_MAP[curPage];
  if(!col)return;
  if(!can('canEdit'))return showNoAccess();
  openAddFor(col,{});
}
function openAddFor(col,defaults){
  if(!can('canEdit')&&col!=='tasks')return showNoAccess();
  curModal=col;editId=null;
  document.getElementById('mboxEl').classList.remove('wide');
  document.getElementById('mtitle').textContent='Добавить '+(COL_TITLES[col]||'');
  document.getElementById('mbody').innerHTML=FORMS[col]||'<p style="color:var(--mu)">Форма не найдена</p>';
  document.getElementById('mfoot').innerHTML=`<button class="btn" onclick="closeM()">Отмена</button><button class="btn btn-acc" onclick="doSave()">Добавить</button>`;
  if(defaults)Object.entries(defaults).forEach(([k,v])=>{const el=document.getElementById('f_'+k);if(el)el.value=v;});
  document.getElementById('mov').classList.add('open');
  setTimeout(()=>document.querySelector('#mbody .fi')?.focus(),80);
}
function editRec(col,id){
  const dk=DKEY[col]||col;
  const rec=D[dk]?.find(r=>r.id===id);if(!rec)return;
  curModal=col;editId=id;
  document.getElementById('mboxEl').classList.remove('wide');
  document.getElementById('mtitle').textContent='Редактировать';
  document.getElementById('mbody').innerHTML=FORMS[col]||'';
  (FIELDS[col]||[]).forEach(f=>{const el=document.getElementById('f_'+f);if(el&&rec[f]!=null)el.value=rec[f];});
  if(col==='docs'&&rec.signers){const el=document.getElementById('f_signer_names');if(el)el.value=rec.signers.map(s=>s.name).join(', ');}
  document.getElementById('mfoot').innerHTML=`
    ${can('canDelete')?`<button class="btn btn-del" onclick="delRec('${col}',${id})">Удалить</button>`:''}
    <button class="btn" onclick="closeM()">Отмена</button>
    <button class="btn btn-acc" onclick="doSave()">Сохранить</button>`;
  document.getElementById('mov').classList.add('open');
}
async function delRec(col,id){
  if(!confirm('Удалить?'))return;
  const ok=await dbD(col,id);if(!ok)return;
  const dk=DKEY[col]||col;D[dk]=D[dk].filter(r=>r.id!==id);
  badges();closeM();render(curPage);toast('Удалено','info');
}
async function doSave(){
  const col=curModal;const row={};
  (FIELDS[col]||[]).forEach(f=>{
    const el=document.getElementById('f_'+f);
    if(el){const v=el.value.trim();if(v!=='')row[f]=v;}
  });
  if(col==='meeting_notes'&&!row.title){toast('Укажи название встречи','err');return;}
  if(col!=='meeting_notes'&&!row.name&&!row.amount&&!row.client){toast('Заполни обязательные поля','err');return;}
  if(col==='docs'){
    const sn=document.getElementById('f_signer_names')?.value||'';
    const names=sn.split(',').map(s=>s.trim()).filter(Boolean);
    if(editId){
      const ex=D.docs.find(d=>d.id===editId);
      row.signers=names.map(n=>ex?.signers?.find(s=>s.name===n)||{name:n,status:'Pending'});
    } else {
      row.signers=names.map(n=>({name:n,status:'Pending'}));
      row.uploaded_by=curUser?.user_metadata?.full_name||curUser?.email||'Unknown';
      if(names.length>0&&!row.doc_status)row.doc_status='На подписи';
      else if(!row.doc_status)row.doc_status='Черновик';
    }
  }
  const dk=DKEY[col]||col;
  if(editId){
    const ok=await dbU(col,editId,row);if(!ok)return;
    D[dk]=D[dk].map(r=>r.id===editId?{...r,...row}:r);
    toast('Сохранено ✓','ok');
  } else {
    const ins=await dbI(col,row);if(!ins)return;
    D[dk].unshift(ins);
    if(col==='docs'&&row.signers?.length)await addNotif('Новый документ требует подписи','«'+(row.name||'')+'» — '+row.uploaded_by,'docs');
    if(col==='tasks'&&row.assignee)await addNotif('Новая задача: '+(row.name||''),'Назначено: '+row.assignee,'tasks');
    if(col==='meeting_notes')await addNotif('Новая запись встречи','«'+(row.title||'')+'»','notes');
    toast('Добавлено ✓','ok');
  }
  badges();closeM();render(curPage);
}

function showNoAccess(){toast('Нет прав для этого действия','err');}
function closeM(){document.getElementById('mov').classList.remove('open');}
document.getElementById('mov').addEventListener('click',e=>{if(e.target===document.getElementById('mov'))closeM();});
function toast(msg,type='ok'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.className='toast',2600);}
function openMob(){document.getElementById('sidebar').classList.add('open');document.getElementById('ovBg').classList.add('open');}
function closeMob(){document.getElementById('sidebar').classList.remove('open');document.getElementById('ovBg').classList.remove('open');}
</script>
</body>
</html>
