<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wild Pixel — Workspace</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080a;--sur:#111114;--sur2:#17171b;--sur3:#1e1e24;
  --b:#ffffff0f;--b2:#ffffff18;--b3:#ffffff26;
  --acc:#c8ff00;--acc2:#00e5ff;--acc3:#b44dff;
  --tx:#efefef;--mu:#68686f;--mu2:#9696a0;
  --ok:#3ddc84;--warn:#ffaa00;--err:#ff4d4d;--inf:#4db8ff;
  --r:10px;--rs:7px;--rl:14px;
}
html{font-size:15px}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
button,input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--b3);border-radius:4px}

/* AUTH SCREEN */
#authScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-box{background:var(--sur);border:1px solid var(--b2);border-radius:var(--rl);padding:36px;width:100%;max-width:380px}
.auth-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;margin-bottom:6px}
.auth-logo span{color:var(--acc)}
.auth-sub{font-size:12px;color:var(--mu2);margin-bottom:28px;letter-spacing:.5px}
.auth-tabs{display:flex;gap:2px;background:var(--sur2);padding:3px;border-radius:var(--rs);margin-bottom:22px}
.auth-tab{flex:1;padding:7px;border-radius:5px;font-size:13px;cursor:pointer;color:var(--mu2);border:none;background:none;transition:all .15s}
.auth-tab.active{background:var(--sur3);color:var(--tx);font-weight:500}
.auth-err{background:#ff4d4d18;border:1px solid #ff4d4d40;color:var(--err);font-size:12px;padding:10px 12px;border-radius:var(--rs);margin-bottom:14px;display:none}

/* APP */
#app{display:none;display:flex;min-height:100vh}
.sidebar{width:224px;background:var(--sur);border-right:1px solid var(--b);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:40;transition:transform .25s}
.main{flex:1;min-width:0;display:flex;flex-direction:column}

.logo{padding:20px 16px 16px;border-bottom:1px solid var(--b)}
.logo-mark{font-family:'Syne',sans-serif;font-weight:800;font-size:16px}
.logo-mark span{color:var(--acc)}
.logo-sub{font-size:10px;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-top:2px}

.user-chip{margin:10px 8px 0;padding:8px 10px;background:var(--sur2);border-radius:var(--rs);display:flex;align-items:center;gap:8px}
.user-av{width:26px;height:26px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#000;flex-shrink:0}
.user-name{font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-role{font-size:10px;color:var(--mu2)}
.logout-btn{background:none;border:none;color:var(--mu);cursor:pointer;padding:2px;font-size:16px;line-height:1}
.logout-btn:hover{color:var(--tx)}

.nav{padding:10px 8px;flex:1}
.nav-sec{font-size:10px;color:var(--mu);letter-spacing:1.5px;text-transform:uppercase;padding:10px 10px 5px;font-weight:500}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--rs);cursor:pointer;font-size:13px;color:var(--mu2);border:none;background:none;width:100%;text-align:left;transition:all .12s;position:relative}
.ni:hover{background:var(--sur2);color:var(--tx)}
.ni.on{background:var(--sur2);color:var(--tx)}
.ni.on::before{content:'';position:absolute;left:0;top:22%;bottom:22%;width:2px;background:var(--acc);border-radius:2px}
.ni svg{width:14px;height:14px;flex-shrink:0;opacity:.65}
.ni.on svg,.ni:hover svg{opacity:1}
.nbdg{margin-left:auto;background:var(--sur3);color:var(--mu2);font-size:10px;padding:1px 6px;border-radius:20px}
.nbdg.hot{background:#ff4d4d22;color:var(--err)}

/* TOPBAR */
.topbar{padding:14px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b);background:var(--sur);position:sticky;top:0;z-index:30;flex-shrink:0}
.tbar-l{display:flex;align-items:center;gap:10px}
.pg-title{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;letter-spacing:-.3px}
.tbar-r{display:flex;align-items:center;gap:8px;position:relative}

/* NOTIF */
.notif-btn{background:none;border:1px solid var(--b2);border-radius:var(--rs);padding:7px;cursor:pointer;color:var(--mu2);display:flex;align-items:center;position:relative;transition:all .12s}
.notif-btn:hover{background:var(--sur2);color:var(--tx)}
.notif-dot{position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--err);border-radius:50%;border:1.5px solid var(--sur);display:none}
.notif-panel{display:none;position:absolute;top:calc(100%+8px);right:0;width:300px;background:var(--sur);border:1px solid var(--b2);border-radius:var(--r);z-index:200}
.notif-panel.open{display:block}
.notif-hdr{padding:10px 14px;border-bottom:1px solid var(--b);font-size:12px;font-weight:500;display:flex;justify-content:space-between;align-items:center}
.notif-list{max-height:300px;overflow-y:auto}
.notif-item{padding:10px 14px;border-bottom:1px solid var(--b);cursor:pointer;transition:background .1s}
.notif-item:hover{background:var(--sur2)}
.notif-item.unread{border-left:2px solid var(--acc)}
.notif-item-t{font-size:12px;font-weight:500;margin-bottom:2px}
.notif-item-s{font-size:11px;color:var(--mu2)}
.notif-item-time{font-size:10px;color:var(--mu);margin-top:3px}
.notif-empty{padding:22px;text-align:center;color:var(--mu);font-size:13px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--rs);font-size:12px;cursor:pointer;border:1px solid var(--b2);background:transparent;color:var(--tx);transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--sur2)}
.btn:active{transform:scale(.98)}
.btn-acc{background:var(--acc);color:#000;border-color:transparent;font-weight:600}
.btn-acc:hover{background:#d4ff1a}
.btn-sm{padding:5px 9px;font-size:11px}
.btn-ghost{border-color:transparent;color:var(--mu2)}
.btn-ghost:hover{color:var(--tx);background:var(--sur2)}
.btn-del{border-color:var(--err);color:var(--err)}
.btn-del:hover{background:#ff4d4d18}

/* PAGE */
.page{padding:20px 22px 50px;flex:1}
.page-hidden{display:none}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(125px,1fr));gap:10px;margin-bottom:20px}
.stat{background:var(--sur);border:1px solid var(--b);border-radius:var(--r);padding:14px 15px}
.stat-l{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.stat-v{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;line-height:1}
.ca{color:var(--acc)}.ci{color:var(--inf)}.cw{color:var(--warn)}.cs{color:var(--ok)}.ce{color:var(--err)}.cm{color:var(--mu2)}

/* SEC HDR */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;margin-top:20px}
.sh:first-child{margin-top:0}
.st{font-size:11px;font-weight:500;color:var(--mu);text-transform:uppercase;letter-spacing:1px}

/* TABLE */
.tw{background:var(--sur);border:1px solid var(--b);border-radius:var(--r);overflow:hidden;overflow-x:auto}
.tw table{width:100%;border-collapse:collapse;font-size:13px;min-width:460px}
.tw th{padding:8px 13px;text-align:left;font-size:10px;font-weight:500;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--b);background:var(--sur2);white-space:nowrap}
.tw td{padding:10px 13px;border-bottom:1px solid var(--b);vertical-align:middle}
.tw tr:last-child td{border-bottom:none}
.tw tr.clk{cursor:pointer}
.tw tr.clk:hover td{background:#ffffff03}

/* BADGE */
.bd{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.bd-lead{background:#4db8ff15;color:var(--inf)}
.bd-contacted{background:#ffaa0015;color:var(--warn)}
.bd-proposal{background:#c8ff0015;color:var(--acc)}
.bd-won{background:#3ddc8415;color:var(--ok)}
.bd-lost{background:#ff4d4d15;color:var(--err)}
.bd-negotiation{background:#b44dff15;color:var(--acc3)}
.bd-brief,.bd-preproduction{background:#4db8ff15;color:var(--inf)}
.bd-active,.bd-shoot{background:#c8ff0015;color:var(--acc)}
.bd-post{background:#b44dff15;color:var(--acc3)}
.bd-delivered{background:#3ddc8415;color:var(--ok)}
.bd-archived{background:#ffffff10;color:var(--mu2)}
.bd-high{background:#ff4d4d15;color:var(--err)}
.bd-medium{background:#ffaa0015;color:var(--warn)}
.bd-low{background:#ffffff10;color:var(--mu2)}
.bd-todo{background:#ffffff10;color:var(--mu2)}
.bd-inprogress{background:#4db8ff15;color:var(--inf)}
.bd-review{background:#b44dff15;color:var(--acc3)}
.bd-done{background:#3ddc8415;color:var(--ok)}
.bd-draft{background:#ffffff10;color:var(--mu2)}
.bd-sent{background:#4db8ff15;color:var(--inf)}
.bd-paid{background:#3ddc8415;color:var(--ok)}
.bd-overdue{background:#ff4d4d15;color:var(--err)}
.bd-pending{background:#ffaa0015;color:var(--warn)}
.bd-signed{background:#3ddc8415;color:var(--ok)}
.bd-available{background:#3ddc8415;color:var(--ok)}
.bd-onproject{background:#4db8ff15;color:var(--inf)}
.bd-onleave{background:#ff4d4d15;color:var(--err)}

/* KANBAN */
.kanban{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;align-items:flex-start}
.kcol{background:var(--sur);border:1px solid var(--b);border-radius:var(--r);min-width:205px;width:205px;flex-shrink:0}
.khdr{padding:9px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--mu);border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}
.kcnt{font-size:10px;color:var(--mu);background:var(--sur2);padding:1px 6px;border-radius:20px}
.kcards{padding:7px;display:flex;flex-direction:column;gap:5px;min-height:36px}
.kcard{background:var(--sur2);border:1px solid var(--b);border-radius:var(--rs);padding:9px;cursor:pointer;transition:border-color .12s}
.kcard:hover{border-color:var(--b3)}
.kcard-n{font-size:12px;font-weight:500;margin-bottom:3px}
.kcard-m{font-size:11px;color:var(--mu2)}
.kcard-v{font-size:11px;color:var(--acc);margin-top:5px;font-weight:500}
.kcard-next{font-size:10px;color:var(--mu);margin-top:5px;padding-top:5px;border-top:1px solid var(--b)}
.kadd{width:100%;background:none;border:none;color:var(--mu);font-size:12px;padding:8px;cursor:pointer;text-align:left;border-radius:var(--rs)}
.kadd:hover{background:var(--sur2);color:var(--tx)}

/* GANTT */
.gantt-wrap{background:var(--sur);border:1px solid var(--b);border-radius:var(--r);overflow:hidden}
.gantt-body{display:flex}
.gantt-labels{width:200px;flex-shrink:0;border-right:1px solid var(--b)}
.gantt-label-row{padding:9px 13px;border-bottom:1px solid var(--b);font-size:12px;display:flex;align-items:center;gap:7px;cursor:pointer;height:38px}
.gantt-label-row:hover{background:var(--sur2)}
.gantt-label-row:last-child{border-bottom:none}
.gantt-rows{flex:1;overflow-x:auto}
.gantt-row{height:38px;border-bottom:1px solid var(--b);position:relative}
.gantt-row:last-child{border-bottom:none}
.gantt-bar{position:absolute;height:22px;top:8px;border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:500;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-today{position:absolute;top:0;bottom:0;width:1.5px;background:var(--err);opacity:.6;pointer-events:none;z-index:2}
.gantt-hdr{display:flex;border-bottom:1px solid var(--b)}
.gantt-lhdr{width:200px;flex-shrink:0;padding:8px 13px;font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;background:var(--sur2);border-right:1px solid var(--b)}
.gantt-months{flex:1;overflow:hidden;background:var(--sur2);display:flex}
.gantt-month{flex-shrink:0;padding:8px 4px;font-size:10px;color:var(--mu);text-align:center;border-right:1px solid var(--b);text-transform:uppercase;letter-spacing:.5px}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700}
.cal-grid7{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--b)}
.cal-hdr{background:var(--sur2);padding:8px 4px;font-size:10px;color:var(--mu);text-align:center;text-transform:uppercase;letter-spacing:.8px}
.cal-cell{background:var(--sur);padding:5px;min-height:76px}
.cal-dn{font-size:11px;color:var(--mu);margin-bottom:3px;font-weight:500}
.cal-dn.today{color:var(--acc);font-weight:700}
.cal-dn.other-m{color:var(--b3)}
.cal-ev{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.cal-ev.proj{background:#4db8ff15;color:var(--inf);border-left:2px solid var(--inf)}
.cal-ev.task{background:#b44dff15;color:var(--acc3);border-left:2px solid var(--acc3)}
.cal-ev.doc{background:#ffaa0015;color:var(--warn);border-left:2px solid var(--warn)}

/* DOC CARDS */
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.doc-card{background:var(--sur);border:1px solid var(--b);border-radius:var(--r);padding:15px;cursor:pointer;transition:border-color .12s}
.doc-card:hover{border-color:var(--b3)}
.doc-card-n{font-size:13px;font-weight:500;margin-bottom:4px}
.doc-card-m{font-size:11px;color:var(--mu2);margin-bottom:10px}
.doc-signer{display:flex;align-items:center;justify-content:space-between;font-size:11px;padding:5px 8px;background:var(--sur2);border-radius:var(--rs);margin-bottom:4px}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--sur2);padding:3px;border-radius:var(--rs);width:fit-content;margin-bottom:16px}
.tab{padding:6px 13px;border-radius:5px;font-size:12px;cursor:pointer;color:var(--mu2);border:none;background:none;transition:all .12s}
.tab.on{background:var(--sur3);color:var(--tx);font-weight:500}

/* FILTER */
.fbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.fbar input,.fbar select{background:var(--sur);border:1px solid var(--b2);border-radius:var(--rs);padding:6px 10px;color:var(--tx);font-size:12px;outline:none}
.fbar input{width:175px}
.fbar input:focus,.fbar select:focus{border-color:var(--acc)}

/* MODAL */
.mov{display:none;position:fixed;inset:0;background:#000000cc;z-index:100;align-items:center;justify-content:center;padding:16px}
.mov.open{display:flex}
.mbox{background:var(--sur);border:1px solid var(--b2);border-radius:var(--rl);width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.mhdr{padding:18px 20px 0;display:flex;align-items:center;justify-content:space-between}
.mtitle{font-family:'Syne',sans-serif;font-weight:700;font-size:17px}
.mx{background:none;border:none;color:var(--mu);cursor:pointer;font-size:22px;line-height:1;padding:2px}
.mx:hover{color:var(--tx)}
.mbody{padding:16px 20px}
.mfoot{padding:0 20px 18px;display:flex;justify-content:flex-end;gap:8px}

/* FORM */
.fg{margin-bottom:12px}
.fl{display:block;font-size:11px;color:var(--mu);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.fi{width:100%;background:var(--sur2);border:1px solid var(--b2);border-radius:var(--rs);padding:8px 11px;color:var(--tx);font-size:13px;outline:none;transition:border-color .12s}
.fi:focus{border-color:var(--acc)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
textarea.fi{resize:vertical;min-height:68px}

/* AV */
.av{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--sur3);border:1px solid var(--b2);font-size:9px;font-weight:600;color:var(--mu2);flex-shrink:0}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--sur2);border:1px solid var(--b2);border-radius:var(--rs);padding:10px 14px;font-size:13px;z-index:300;transform:translateY(70px);opacity:0;transition:all .25s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-left:2px solid var(--ok)}
.toast.err{border-left:2px solid var(--err)}
.toast.info{border-left:2px solid var(--inf)}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--mu);font-size:13px;gap:10px}
.spin{width:16px;height:16px;border:2px solid var(--b3);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

.empty{text-align:center;padding:36px;color:var(--mu);font-size:13px}

/* MOB */
.mob-btn{display:none;background:none;border:1px solid var(--b2);border-radius:var(--rs);padding:7px;cursor:pointer;color:var(--tx)}
.ov-bg{display:none;position:fixed;inset:0;background:#00000090;z-index:39}

@media(max-width:780px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .mob-btn{display:flex}
  .ov-bg.open{display:block}
  .page{padding:14px 14px 40px}
  .topbar{padding:12px 14px}
  .fr2{grid-template-columns:1fr}
  .stats{grid-template-columns:repeat(2,1fr)}
  .kanban{padding-bottom:16px}
  .cal-cell{min-height:52px}
  .gantt-labels{width:130px}
  .gantt-lhdr{width:130px}
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<div class="ov-bg" id="ovBg" onclick="closeMob()"></div>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">Wild<span>Pixel</span></div>
    <div class="auth-sub">VIRTUAL PRODUCTION · DUBAI</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="authTab('login',this)">Войти</button>
      <button class="auth-tab" onclick="authTab('reg',this)">Регистрация</button>
    </div>
    <div class="auth-err" id="authErr"></div>
    <div id="loginForm">
      <div class="fg"><label class="fl">Email</label><input class="fi" id="loginEmail" type="email" placeholder="your@email.com"></div>
      <div class="fg"><label class="fl">Пароль</label><input class="fi" id="loginPass" type="password" placeholder="••••••••"></div>
      <button class="btn btn-acc" style="width:100%;justify-content:center;padding:10px" onclick="doLogin()">Войти</button>
    </div>
    <div id="regForm" style="display:none">
      <div class="fg"><label class="fl">Имя</label><input class="fi" id="regName" placeholder="Имя Фамилия"></div>
      <div class="fg"><label class="fl">Email</label><input class="fi" id="regEmail" type="email" placeholder="your@email.com"></div>
      <div class="fg"><label class="fl">Пароль (мин. 6 символов)</label><input class="fi" id="regPass" type="password" placeholder="••••••••"></div>
      <button class="btn btn-acc" style="width:100%;justify-content:center;padding:10px" onclick="doReg()">Создать аккаунт</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
<!-- MODAL -->
<div class="mov" id="mov">
  <div class="mbox">
    <div class="mhdr"><div class="mtitle" id="mtitle">—</div><button class="mx" onclick="closeM()">×</button></div>
    <div class="mbody" id="mbody"></div>
    <div class="mfoot" id="mfoot"></div>
  </div>
</div>

<aside class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-mark">Wild<span>Pixel</span></div>
    <div class="logo-sub">Virtual Production</div>
  </div>
  <div class="user-chip">
    <div class="user-av" id="userAv">?</div>
    <div style="flex:1;min-width:0">
      <div class="user-name" id="userName">—</div>
      <div class="user-role" id="userRole">Member</div>
    </div>
    <button class="logout-btn" onclick="doLogout()" title="Выйти">↩</button>
  </div>
  <nav class="nav">
    <div class="nav-sec">Обзор</div>

  const email = document.getElementById('loginEmail').value.trim();

  if (!email || !pass) { showAuthErr('Заполни все поля'); return; }
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) showAuthErr(error.message === 'Invalid login credentials' ? 'Неверный email или пароль' : error.message);
}

async function doReg() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPass').value;

  const { error } = await sb.auth.signUp({ email, password: pass, options: { data: { full_name: name } } });

}

// ── DATA CACHE ──
let DATA = { clients: [], projects: [], tasks: [], team: [], invoices: [], docs: [], notifs: [] };

async function loadAll() {
  const tables = ['clients','projects','tasks','team_members','invoices','documents','notifications'];
  const keys =   ['clients','projects','tasks','team',       'invoices','docs',      'notifs'];
  await Promise.all(tables.map(async (t, i) => {
    const { data } = await sb.from(t).select('*').order('id', { ascending: false });
    DATA[keys[i]] = data || [];
  }));
  badges();
  renderNotifs();
}

async function dbInsert(table, row) {
  const { data, error } = await sb.from(table).insert(row).select().single();
  if (error) { toast('Ошибка: ' + error.message, 'err'); return null; }
  return data;
}

async function dbUpdate(table, id, row) {
  const { error } = await sb.from(table).update(row).eq('id', id);
  if (error) { toast('Ошибка: ' + error.message, 'err'); return false; }
  return true;
}

async function dbDelete(table, id) {
  const { error } = await sb.from(table).delete().eq('id', id);
  if (error) { toast('Ошибка', 'err'); return false; }
  return true;
}

// ── REALTIME ──
function setupRealtime() {
  sb.channel('wp-realtime')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'notifications' }, async () => {
      const { data } = await sb.from('notifications').select('*').order('id', { ascending: false });
      DATA.notifs = data || [];
      badges(); renderNotifs();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'documents' }, async () => {
      const { data } = await sb.from('documents').select('*').order('id', { ascending: false });
      DATA.docs = data || [];
      badges();
      if (curPage === 'docs') render('docs');
      if (curPage === 'dash') render('dash');
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, async () => {
      const { data } = await sb.from('tasks').select('*').order('id', { ascending: false });
      DATA.tasks = data || [];
      badges();
      if (curPage === 'tasks') render('tasks');
    })
    .subscribe();
}

// ── HELPERS ──
function bdg(t) {
  const m = { 'Lead':'lead','Contacted':'contacted','Proposal Sent':'proposal','Won':'won','Lost':'lost','Negotiation':'negotiation','Brief':'brief','Pre-Production':'preproduction','Active':'active','Shoot':'shoot','Post':'post','Delivered':'delivered','Archived':'archived','High':'high','Medium':'medium','Low':'low','To Do':'todo','In Progress':'inprogress','Review':'review','Done':'done','Draft':'draft','Sent':'sent','Paid':'paid','Overdue':'overdue','Pending':'pending','Signed':'signed','Available':'available','On Project':'onproject','On Leave':'onleave' };
  return `<span class="bd bd-${m[t]||'todo'}">${t}</span>`;
}
function fmtAED(n) { return n ? 'AED ' + Number(n).toLocaleString('en-AE') : '—'; }
function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso), now = new Date(), diff = Math.floor((now - d) / 60000);
  if (diff < 2) return 'только что';
  if (diff < 60) return diff + 'м назад';
  if (diff < 1440) return Math.floor(diff / 60) + 'ч назад';
  return d.toLocaleDateString('ru', { day:'numeric', month:'short' });
}
function av(name, sz=26) {
  const ini = (name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  return `<div class="av" style="width:${sz}px;height:${sz}px;font-size:${sz>30?11:9}px">${ini}</div>`;
}
function empty(txt) { return `<div class="empty">${txt}</div>`; }

function filterCRM() {

function buildCRMTable(cl) {

async function rGantt() {
  return `<div id="ganttWrap"></div>`;

function initGantt() {
  const wrap = document.getElementById('ganttWrap'); if (!wrap) return;
  const projs = DATA.projects.filter(p => p.start_date && p.end_date && p.status !== 'Archived');
  if (!projs.length) { wrap.innerHTML = empty('Добавь проекты со сроками для отображения на диаграмме'); return; }
  const allD = projs.flatMap(p => [new Date(p.start_date), new Date(p.end_date)]);
  let mn = new Date(Math.min(...allD)), mx = new Date(Math.max(...allD));
  mn = new Date(mn.getFullYear(), mn.getMonth(), 1);
  mx = new Date(mx.getFullYear(), mx.getMonth()+1, 0);
  const totalDays = Math.ceil((mx-mn)/86400000)+1, DW=22, RH=38;
  const totalW = totalDays*DW;
  const today = new Date();
  const months = [];
  let d = new Date(mn);
  while (d <= mx) {
    const y=d.getFullYear(), m=d.getMonth();
    const s=Math.max(0,Math.ceil((new Date(y,m,1)-mn)/86400000));
    const e=Math.min(totalDays-1,Math.ceil((new Date(y,m+1,0)-mn)/86400000));
    months.push({label:new Date(y,m,1).toLocaleDateString('ru',{month:'short',year:'2-digit'}),left:s*DW,width:(e-s+1)*DW});
    d=new Date(y,m+1,1);
  }
  const todayL = Math.ceil((today-mn)/86400000)*DW;
  wrap.innerHTML = `<div class="gantt-wrap">
    <div class="gantt-hdr">
      <div class="gantt-lhdr">Проект</div>
      <div class="gantt-months" style="overflow:hidden">
        <div style="display:flex;min-width:${totalW}px">${months.map(m=>`<div class="gantt-month" style="width:${m.width}px">${m.label}</div>`).join('')}</div>
      </div>
    </div>
    <div class="gantt-body">
      <div class="gantt-labels">
        ${projs.map(p=>`<div class="gantt-label-row" onclick="editRec('projects',${p.id})">
          <div style="width:8px;height:8px;border-radius:2px;background:${GANTT_COLORS[projs.indexOf(p)%GANTT_COLORS.length]};flex-shrink:0"></div>
          <span style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</span>
        </div>`).join('')}
      </div>
      <div class="gantt-rows" style="overflow-x:auto;flex:1">
        <div style="position:relative;width:${totalW}px">
          ${projs.map((_,i)=>`<div class="gantt-row" style="width:${totalW}px"></div>`).join('')}
          ${todayL>=0&&todayL<=totalW?`<div class="gantt-today" style="left:${todayL}px"></div>`:''}
          ${projs.map((p,i)=>{
            const s=Math.max(0,Math.ceil((new Date(p.start_date)-mn)/86400000));
            const e=Math.ceil((new Date(p.end_date)-mn)/86400000);
            const left=s*DW, width=Math.max(DW,(e-s+1)*DW);
            const color=GANTT_COLORS[i%GANTT_COLORS.length];
            return `<div class="gantt-bar" style="left:${left}px;top:${i*RH+8}px;width:${width}px;background:${color}22;border:1px solid ${color}66;color:${color}" onclick="editRec('projects',${p.id})">${p.name}</div>`;
          }).join('')}
        </div>
      </div>
    </div>
  </div>
  <div style="margin-top:10px;font-size:11px;color:var(--mu2)">Красная линия = сегодня. Кликни на бар чтобы редактировать.</div>`;
}

async function rCal() { return `<div id="calWrap"></div>`; }
function initCal() {
  const wrap = document.getElementById('calWrap'); if (!wrap) return;
  const now = new Date(calYear, calMonth, 1);
  const mname = now.toLocaleDateString('ru', { month:'long', year:'numeric' });
  const firstDay = (now.getDay()+6)%7, daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const today = new Date();
  const events = {};
  const addEv = (dt, txt, cls) => { if (!events[dt]) events[dt]=[]; events[dt].push({txt,cls}); };
  DATA.projects.forEach(p => {
    const ym = `${calYear}-${String(calMonth+1).padStart(2,'0')}`;
    if (p.start_date?.startsWith(ym)) addEv(p.start_date, '▶ '+p.name, 'proj');
    if (p.end_date?.startsWith(ym)) addEv(p.end_date, '■ '+p.name, 'proj');
  });
  DATA.tasks.forEach(t => { if (t.due_date?.startsWith(`${calYear}-${String(calMonth+1).padStart(2,'0')}`)) addEv(t.due_date, '✓ '+t.name, 'task'); });
  DATA.docs.forEach(d => { if (d.due_date?.startsWith(`${calYear}-${String(calMonth+1).padStart(2,'0')}`)) addEv(d.due_date, '📄 '+d.name, 'doc'); });
  const days = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  let cells = '';
  for (let i=0; i<firstDay; i++) cells += `<div class="cal-cell"></div>`;
  for (let dd=1; dd<=daysInMonth; dd++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
    const isToday = today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===dd;
    cells += `<div class="cal-cell"><div class="cal-dn${isToday?' today':''}">${dd}</div>${(events[ds]||[]).slice(0,3).map(e=>`<div class="cal-ev ${e.cls}" title="${e.txt}">${e.txt}</div>`).join('')}</div>`;
  }
  wrap.innerHTML = `
  <div class="cal-nav"><button class="btn" onclick="calNav(-1)">‹</button><div class="cal-title">${mname}</div><button class="btn" onclick="calNav(1)">›</button></div>
  <div style="background:var(--sur);border:1px solid var(--b);border-radius:var(--r);overflow:hidden">
    <div class="cal-grid7">${days.map(d=>`<div class="cal-hdr">${d}</div>`).join('')}</div>
    <div class="cal-grid7">${cells}</div>
  </div>`;
}
function calNav(dir) { calMonth+=dir; if(calMonth>11){calMonth=0;calYear++;} if(calMonth<0){calMonth=11;calYear--;} initCal(); }

async function signDoc(docId, idx) {
  const d = DATA.docs.find(x=>x.id===docId); if(!d) return;
  const signers = [...(d.signers||[])];
  const name = curUser?.user_metadata?.full_name || curUser?.email || 'Unknown';
  signers[idx] = {...signers[idx], status:'Signed', signed_at: new Date().toISOString().slice(0,10), signed_by: name};
  const allSigned = signers.every(s=>s.status==='Signed');
  await dbUpdate('documents', docId, { signers, status: allSigned ? 'Fully Signed' : 'Pending' });
  if (allSigned) await addNotif('Документ полностью подписан', '«'+d.name+'» подписан всеми', 'docs');
  else await addNotif(name+' подписал документ', '«'+d.name+'»', 'docs');
  DATA.docs = DATA.docs.map(x=>x.id===docId?{...x,signers,status:allSigned?'Fully Signed':'Pending'}:x);
  toast('Подписано','ok'); closeM(); render('docs');
}

      <div class="fg"><label class="fl">Срок оплаты</label><input class="fi" id="f_due_date" type="date"></div>
    </div>`,

  team_members:`
    <div class="fg"><label class="fl">Имя *</label><input class="fi" id="f_name" placeholder="Имя Фамилия"></div>
    <div class="fr2">
      <div class="fg"><label class="fl">Роль</label><select class="fi" id="f_role"><option>Director</option><option>Producer</option><option>VP Tech</option><option>Art Director</option><option>Editor</option><option>DIT</option><option>Freelancer</option><option>Other</option></select></div>
      <div class="fg"><label class="fl">Статус</label><select class="fi" id="f_availability"><option>Available</option><option>On Project</option><option>On Leave</option></select></div>
    </div>
    <div class="fr2">
      <div class="fg"><label class="fl">Текущий проект</label><input class="fi" id="f_current_project" placeholder="Название"></div>
      <div class="fg"><label class="fl">Контакт</label><input class="fi" id="f_contact" placeholder="Telegram / тел."></div>
    </div>
    <div class="fg"><label class="fl">Навыки</label><input class="fi" id="f_skills" placeholder="LED Volume, Unreal, DIT..."></div>`
};

const FIELDS = {
  clients:['name','type','source','stage','value','contact','next_action','next_date','notes'],
  projects:['name','client','type','status','start_date','end_date','budget','drive_link'],
  tasks:['name','project','assignee','priority','status','due_date'],
  docs:['name','type','project','file_name','due_date','notes'],
  invoices:['num','type','client','project','amount','status','issue_date','due_date'],
  team_members:['name','role','availability','current_project','contact','skills']
};

const COL_MAP = { dash:'clients',bd:'clients',crm:'clients',projects:'projects',gantt:'projects',cal:'projects',tasks:'tasks',docs:'docs',finance:'invoices',team:'team_members' };
const COL_TITLES = { clients:'лид',projects:'проект',tasks:'задачу',docs:'документ',invoices:'инвойс',team_members:'сотрудника' };

let curModal = null, editId = null;

function openAdd() { openAddFor(COL_MAP[curPage]||'clients', {}); }
function openAddFor(col, defaults) {
  curModal = col; editId = null;
  document.getElementById('mtitle').textContent = 'Добавить ' + (COL_TITLES[col]||'');
  document.getElementById('mbody').innerHTML = FORMS[col]||'';
  document.getElementById('mfoot').innerHTML = `<button class="btn" onclick="closeM()">Отмена</button><button class="btn btn-acc" onclick="doSave()">Добавить</button>`;
  Object.entries(defaults||{}).forEach(([k,v]) => { const el=document.getElementById('f_'+k); if(el) el.value=v; });
  document.getElementById('mov').classList.add('open');
  setTimeout(()=>document.querySelector('#mbody .fi')?.focus(), 80);
}

function editRec(col, id) {
  const dataKey = col==='team_members'?'team':col;
  const rec = DATA[dataKey]?.find(r=>r.id===id); if(!rec) return;
  curModal = col; editId = id;
  document.getElementById('mtitle').textContent = 'Редактировать';
  document.getElementById('mbody').innerHTML = FORMS[col]||'';
  (FIELDS[col]||[]).forEach(f => { const el=document.getElementById('f_'+f); if(el&&rec[f]!=null) el.value=rec[f]; });
  if (col==='docs' && rec.signers) {
    const el = document.getElementById('f_signer_names');
    if (el) el.value = rec.signers.map(s=>s.name).join(', ');
  }
  document.getElementById('mfoot').innerHTML = `<button class="btn btn-del" onclick="delRec('${col}',${id})">Удалить</button><button class="btn" onclick="closeM()">Отмена</button><button class="btn btn-acc" onclick="doSave()">Сохранить</button>`;
  document.getElementById('mov').classList.add('open');
}

async function delRec(col, id) {
  if (!confirm('Удалить?')) return;
  const ok = await dbDelete(col, id);
  if (!ok) return;
  const dataKey = col==='team_members'?'team':col;
  DATA[dataKey] = DATA[dataKey].filter(r=>r.id!==id);
  save(); closeM(); render(curPage); toast('Удалено','info');
}

async function doSave() {
  const col = curModal;
  const row = {};
  (FIELDS[col]||[]).forEach(f => { const el=document.getElementById('f_'+f); if(el) { const v=el.value.trim(); if(v) row[f]=v; } });
  if (!row.name && !row.amount) { toast('Заполни обязательные поля','err'); return; }
  if (col==='docs') {
    const sn = document.getElementById('f_signer_names')?.value||'';
    const names = sn.split(',').map(s=>s.trim()).filter(Boolean);
    if (editId) {
      const existing = DATA.docs.find(d=>d.id===editId);
      row.signers = names.map(n => existing?.signers?.find(s=>s.name===n)||{name:n,status:'Pending'});
    } else {
      row.signers = names.map(n=>({name:n,status:'Pending'}));
      row.uploaded_by = curUser?.user_metadata?.full_name || curUser?.email || 'Unknown';
    }
  }
  const dataKey = col==='team_members'?'team':col;
  if (editId) {
    const ok = await dbUpdate(col, editId, row);
    if (!ok) return;
    DATA[dataKey] = DATA[dataKey].map(r=>r.id===editId?{...r,...row}:r);
    toast('Сохранено','ok');
  } else {
    const inserted = await dbInsert(col, row);
    if (!inserted) return;
    DATA[dataKey].unshift(inserted);
    if (col==='docs' && row.signers?.length) {
      const uploaderName = curUser?.user_metadata?.full_name || curUser?.email || 'Unknown';
      await addNotif('Новый документ требует подписи', '«'+row.name+'» загружен пользователем '+uploaderName, 'docs');
    }
    if (col==='tasks' && row.assignee) {
      await addNotif('Новая задача: '+row.name, 'Назначено: '+row.assignee+' · '+row.priority, 'tasks');
    }
    toast('Добавлено','ok');
  }
  badges(); closeM(); render(curPage);
}

function save() { badges(); }
function closeM() { document.getElementById('mov').classList.remove('open'); }
document.getElementById('mov').addEventListener('click', e => { if(e.target===document.getElementById('mov')) closeM(); });

function toast(msg, type='ok') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type+' show';
  setTimeout(()=>t.className='toast',2400);
}
</script>
</body>
</html>
